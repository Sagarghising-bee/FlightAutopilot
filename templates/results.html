{% extends "base.html" %}

{% block content %}
<div class="mb-6 mt-4">
    <h2 class="text-2xl font-extrabold text-gray-900 tracking-tight">{{ origin }} <i class="fa-solid fa-arrow-right mx-2 text-blue-500"></i> {{ destination }}</h2>
    <p class="text-sm text-gray-500 mt-1">{{ date }} | Found {{ flights|length }} flights</p>
</div>

<div class="space-y-4">
    {% for flight in flights %}
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex flex-col">
        <div class="flex justify-between items-center mb-3">
            <div>
                <p class="font-bold text-gray-900 text-lg">{{ flight.airline }}</p>
                <p class="text-sm text-gray-500"><i class="fa-regular fa-clock mr-1"></i> {{ flight.time }} &bull; {{ flight.id }}</p>
            </div>
            <div class="text-right">
                <p class="text-2xl font-black text-blue-600">{{ flight.price }}</p>
            </div>
        </div>
        
        <a href="/autopilot?flight={{ flight.id }}" class="w-full bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold py-2.5 rounded-xl transition-all text-center border border-indigo-200 block">
            <i class="fa-solid fa-robot mr-1"></i> Analyze Delay Risk
        </a>
    </div>
    {% endfor %}
</div>
{% endblock %}
