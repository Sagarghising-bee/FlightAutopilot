<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flight Autopilot Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; padding-bottom: 90px; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-800 font-sans antialiased min-h-screen">

    <main class="w-full max-w-md mx-auto p-4 fade-in">
        {% block content %}{% endblock %}
    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-100 shadow-[0_-5px_15px_-10px_rgba(0,0,0,0.1)] z-50">
        <div class="max-w-md mx-auto flex justify-between items-center px-8 py-3">
            <a href="/" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition-colors">
                <i class="fa-solid fa-magnifying-glass text-xl mb-1"></i>
                <span class="text-[10px] font-bold uppercase tracking-wider">Search</span>
            </a>
            <a href="/autopilot" class="flex flex-col items-center relative -top-5">
                <div class="bg-blue-600 text-white w-14 h-14 flex items-center justify-center rounded-full shadow-lg shadow-blue-300 hover:bg-blue-700 hover:scale-105 transition-all">
                    <i class="fa-solid fa-plane-up text-2xl"></i>
                </div>
                <span class="text-[10px] font-bold uppercase tracking-wider text-blue-600 mt-1">AI Engine</span>
            </a>
            <a href="#" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition-colors">
                <i class="fa-solid fa-heart text-xl mb-1"></i>
                <span class="text-[10px] font-bold uppercase tracking-wider">Saved</span>
            </a>
        </div>
    </nav>
</body>
</html>
